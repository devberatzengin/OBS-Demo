services:
  db:
    image: postgres:16
    container_name: obs-postgres
    restart: always
    environment:
      POSTGRES_DB: obs_db
      POSTGRES_USER: obs_user
      POSTGRES_PASSWORD: obs_password
    ports:
      - "55050:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
